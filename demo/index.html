<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>YAML Trees demo</title>
		<style>
			/* Approximation of Obsidian's default light theme variables, so the
			 * plugin's own styles.css renders as it would inside Obsidian. */
			:root {
				--background-primary: #ffffff;
				--background-primary-alt: #f6f7f9;
				--background-secondary: #f2f3f5;
				--background-modifier-border: #dcdfe4;
				--background-modifier-hover: rgba(0, 0, 0, 0.045);
				--background-modifier-active-hover: rgba(0, 0, 0, 0.08);
				--background-modifier-error: #fbe9e7;
				--text-normal: #202127;
				--text-muted: #6b7280;
				--text-faint: #9aa0aa;
				--text-on-accent: #ffffff;
				--text-accent: #6152e3;
				--text-error: #c0392b;
				--interactive-accent: #7c6ff3;
				--interactive-normal: #f2f3f5;
				--interactive-hover: #e7e8ec;
				--radius-s: 4px;
				--radius-m: 8px;
				--icon-s: 16px;
				--font-ui-small: 14px;
				--font-ui-smaller: 12px;
				--font-monospace: ui-monospace, SFMono-Regular, Menlo, monospace;
				--font-semibold: 600;
				--line-height-normal: 1.5;
				--size-4-1: 4px;
				--size-4-2: 8px;
				--size-4-3: 12px;
				--size-4-4: 16px;
				--size-4-6: 24px;
				--size-4-8: 32px;
			}
			body {
				margin: 0;
				padding: 20px;
				background: var(--background-primary);
				font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
			}
			#app {
				max-width: 760px;
			}
			#app h2 {
				font-size: 14px;
				color: var(--text-muted);
				margin: 20px 0 8px;
				font-weight: 600;
			}
		</style>
		<link rel="stylesheet" href="../styles.css" />
	</head>
	<body>
		<script src="./demo.js"></script>
	</body>
</html>
